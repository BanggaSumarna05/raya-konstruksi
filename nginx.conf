server {
    listen 443 ssl http2;
    server_name rayakonstruksi.com www.rayakonstruksi.com;

    # SSL certificates — Let's Encrypt via Certbot
    # After running: certbot --nginx -d rayakonstruksi.com -d www.rayakonstruksi.com
    # Certbot will populate these paths automatically. If done manually:
    ssl_certificate     /etc/letsencrypt/live/rayakonstruksi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rayakonstruksi.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/rayakonstruksi.com/chain.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    root /var/www/rayakonstruksi/public;
    index index.php;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/ld+json
        image/svg+xml
        font/woff
        font/woff2;

    # Static asset caching — images (1 year, immutable)
    location ~* \.(webp|jpg|jpeg|png|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # Static asset caching — fonts (1 year, immutable)
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Static asset caching — CSS/JS (1 year, immutable for hashed Vite assets)
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://www.google.com https://www.gstatic.com;
        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
        img-src 'self' data: https:;
        font-src 'self' https://cdnjs.cloudflare.com data:;
        connect-src 'self' https://www.google.com;
        frame-src https://www.google.com;
    " always;

    # Cross-Origin headers
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # PHP FastCGI
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_cache_bypass $http_pragma;
        fastcgi_cache_revalidate on;
    }

    # Laravel fallback
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name rayakonstruksi.com www.rayakonstruksi.com;
    return 301 https://$server_name$request_uri;
}
